<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gain - Volume Booster</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #3b82f6;
      --blue-light: #dbeafe;
      --blue-dark: #1d4ed8;
      --bg: #ffffff;
      --surface: #f8fafc;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --active-btn: #eff6ff;
      --active-border: #3b82f6;
      --warn: #f59e0b;
      --radius: 10px;
    }

    body.dark {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --blue-light: #1e3a5f;
      --active-btn: #1e3a5f;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 340px;
      min-height: 200px;
      padding: 18px;
      user-select: none;
      transition: background 0.2s, color 0.2s;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      color: var(--blue);
      font-size: 20px;
    }

    h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 12.5px;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .slider-wrap {
      margin-bottom: 8px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 4px;
      background: linear-gradient(to right, #3b82f6 16.67%, var(--border) 16.67%);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 1px 4px rgba(59,130,246,0.4);
      cursor: pointer;
      transition: transform 0.1s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .slider-labels .vol-display {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      cursor: text;
      padding: 2px 6px;
      border-radius: 5px;
      transition: background 0.15s;
      user-select: text;
    }

    .slider-labels .vol-display:hover {
      background: var(--surface);
    }

    .vol-input {
      width: 72px;
      padding: 2px 6px;
      border: 1.5px solid var(--blue);
      border-radius: 5px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      background: var(--bg);
      text-align: center;
      outline: none;
      display: none;
    }

    .vol-input.visible { display: inline-block; }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .btn {
      flex: 1;
      padding: 8px 6px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.15s;
    }

    .btn:hover {
      border-color: var(--blue);
      background: var(--blue-light);
    }

    .btn.active {
      background: var(--active-btn);
      border-color: var(--active-border);
      color: var(--blue-dark);
    }

    .reset-row {
      margin-bottom: 16px;
    }

    .btn-reset {
      width: 100%;
      padding: 9px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.15s;
    }

    .btn-reset:hover {
      border-color: var(--blue);
      color: var(--blue);
      background: var(--blue-light);
    }

    .tabs-section {
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }

    .tabs-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .tab-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 9px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s;
      font-size: 13px;
    }

    .tab-item:hover {
      background: var(--surface);
    }

    .tab-item.current {
      background: var(--blue-light);
    }

    .tab-favicon {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
      object-fit: contain;
    }

    .tab-favicon-placeholder {
      width: 16px;
      height: 16px;
      background: var(--border);
      border-radius: 3px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
    }

    .tab-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .no-tabs {
      font-size: 12.5px;
      color: var(--text-muted);
      text-align: center;
      padding: 8px 0;
    }

    .btn-gear {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 17px;
      line-height: 1;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-gear:hover {
      background: var(--surface);
      color: var(--text);
      transform: rotate(30deg);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .btn-dark {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 5px;
      border-radius: 6px;
      font-size: 15px;
      line-height: 1;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-dark:hover {
      background: var(--surface);
      transform: scale(1.15);
    }

    .blocked-banner {
      background: #fef3c7;
      border: 1.5px solid #f59e0b;
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 12.5px;
      color: #92400e;
      margin-bottom: 14px;
      display: none;
    }

    .blocked-banner.show { display: block; }

    .donate-bar {
      display: flex;
      justify-content: flex-end;
      padding-top: 10px;
      margin-top: 6px;
      border-top: 1px solid var(--border);
    }

    .btn-donate {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-muted);
      padding: 3px 7px;
      border-radius: 6px;
      font-family: inherit;
      font-weight: 500;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .btn-donate:hover {
      color: #ef4444;
      background: var(--surface);
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo-icon">🔊</span>
    <h1>Gain - Volume Booster</h1>
  </div>
  <div class="header-right">
    <button class="btn-dark" id="btnDark" title="Toggle dark mode">🌙</button>
    <button class="btn-gear" id="btnGear" title="Settings">⚙️</button>
  </div>
</div>

<div class="blocked-banner" id="blockedBanner">
  ⚠️ Gain is <strong>disabled</strong> on this site via your settings.
</div>

<p class="subtitle">Use the slider below to control the volume of the current tab.</p>

<div class="slider-wrap">
  <input type="range" id="volumeSlider" min="0" max="600" value="100" />
</div>
<div class="slider-labels">
  <span>0%</span>
  <span class="vol-display" id="volDisplay" title="Click to type a value">Volume: 100%</span>
  <input class="vol-input" id="volInput" type="number" min="0" max="600" />
  <span>600%</span>
</div>

<br/>

<div class="btn-row">
  <button class="btn" id="btnDefault">↩ Default</button>
  <button class="btn" id="btnVoice">🎙 Voice boost</button>
  <button class="btn" id="btnBass">🚀 Bass boost</button>
</div>

<div class="reset-row">
  <button class="btn-reset" id="btnReset">↻ Reset to 100%</button>
</div>

<div class="tabs-section">
  <div class="tabs-title">Audio tabs</div>
  <div id="tabsList"><p class="no-tabs">No tabs playing audio.</p></div>
</div>

<div class="donate-bar" id="donateBar">
  <button class="btn-donate" id="btnDonate" title="Support Gain with Bitcoin">❤️ Support</button>
</div>

<script src="popup.js"></script>
</body>
</html>
